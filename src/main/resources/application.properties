# =========================================================================
# Configuration de la Base de Données MySQL (boutiqueucak)
# =========================================================================

# 1. Type de base de données (db-kind)
# Spécifie à Quarkus que nous utilisons MySQL. Cela permet à Quarkus d'utiliser le bon pilote JDBC.
quarkus.datasource.db-kind=mysql

# 2. Informations d'authentification
# Votre conteneur docker "mysql_boutiqueucak" est configuré avec MYSQL_ALLOW_EMPTY_PASSWORD=yes
# Le mot de passe root doit donc être laissé vide.
quarkus.datasource.username=root
quarkus.datasource.password=

# 3. URL de connexion JDBC
# - localhost:3306 : correspond à l'adresse de votre serveur MySQL local.
# - boutiqueucak : est le nom de la base de données que nous allons utiliser.
# - createDatabaseIfNotExist=true : demande à MySQL de créer la base de données automatiquement si elle n'existe pas.
quarkus.datasource.jdbc.url=jdbc:mysql://localhost:3306/boutiqueucak?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true

# =========================================================================
# Configuration Hibernate ORM (JPA)
# =========================================================================

# Génération automatique du schéma de la base de données :
# - update : Met à jour le schéma existant sans supprimer les données existantes (recommandé en dev).
# - drop-and-create : Supprime et recrée les tables à chaque démarrage (utile pour charger import.sql).
# - none : Ne fait rien (recommandé en production).
quarkus.hibernate-orm.schema-management.strategy=drop-and-create

# Affichage des requêtes SQL dans la console (très utile pour le débogage)
quarkus.hibernate-orm.log.sql=true

# Exécution automatique du script import.sql au démarrage pour insérer des données de test
quarkus.hibernate-orm.sql-load-script=import.sql

# Désactive la vérification de version DB : XAMPP fournit MariaDB, qui s'annonce
# en 5.5.5 (compatibilité historique) alors que le driver quarkus-jdbc-mysql exige MySQL >= 8.0
quarkus.hibernate-orm.database.version-check.enabled=false

